<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Alimentação Saudável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="titulo">🍎 Alimentação Saudável</h1>

    <!-- GRID SUPERIOR -->
    <div class="grid">

        <div class="card">
            <img src="maca.png" alt="Maçã">
            <h2>Maçã</h2>
            <p>52 kcal</p>
        </div>

        <div class="card">
            <img src="banana2.png" alt="Banana">
            <h2>Banana</h2>
            <p>89 kcal</p>
        </div>

        <div class="card">
            <img src="laranja.png" alt="Laranja">
            <h2>Laranja</h2>
            <p>47 kcal</p>
        </div>

        <div class="card">
            <img src="morango.png" alt="Morango">
            <h2>Morango</h2>
            <p>32 kcal</p>
        </div>

    </div>

    <!-- DESTAQUE -->
    <div class="destaque">
        <h2>💪 Cuide do seu corpo</h2>
        <p>Uma alimentação saudável é o primeiro passo para uma vida melhor!</p>
    </div>

    <!-- GRID INFERIOR (4 EM LINHA) -->
    <div class="grid grid-4">

        <div class="card">
            <img src="ABACAXI.PNG" alt="Abacaxi">
            <h2>Abacaxi</h2>
            <p>50 kcal</p>
        </div>

        <div class="card">
            <img src="melancia.png" alt="Melancia">
            <h2>Melancia</h2>
            <p>30 kcal</p>
        </div>

        <div class="card">
            <img src="uva.png" alt="Uva">
            <h2>Uva</h2>
            <p>69 kcal</p>
        </div>

        <div class="card">
            <img src="manga.png" alt="Manga">
            <h2>Manga</h2>
            <p>60 kcal</p>
        </div>

    </div>

</div>

</body>
</html>
